name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            asset: x86_64-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset: aarch64-linux-gnu
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - run: rustup toolchain install stable --profile minimal
      - run: cargo build --locked --release --target "${{ matrix.target }}"
      - name: Package
        run: |
          archive="pdrive-sync-rs-${{ matrix.asset }}.tar.gz"
          cp "target/${{ matrix.target }}/release/pdrive-sync-rs" pdrive-sync-rs
          tar -czf "$archive" pdrive-sync-rs README.md LICENSE
      - uses: actions/upload-artifact@v7
        with:
          name: pdrive-sync-rs-${{ matrix.asset }}
          path: pdrive-sync-rs-${{ matrix.asset }}.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME" dist/*
          --repo "$GITHUB_REPOSITORY"
          --title "$GITHUB_REF_NAME"
          --notes "Initial release of pdrive-sync-rs, a simple and ligthweight way to orchestrate official CLI of proton-drive"
